<!Doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>NtlwanaHomes</title>
    <meta name="title"  content="NtlwanaHomes">
    <meta name="description" content="This is a simple real estate website ">
    <!--external stylesheets-->
<link rel="stylesheet" href="styles.css">

<!--external js-->
<script src="script.js" defer></script>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Google Icons -->
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@25,400,0..1,0"/>
</head>
<body> 


    <header class="header" data-header>
        <div class="container">

           

           <nav class="navbar">
            <div class="logo"> <a href="#" class="logo">
                <img src="ntlwanaHomes logo.png" height="70" width="200" alt="NtlwanaHomes logo">
            </a> 
        </div>
          <ul class="navbar-list">
            <li><a href="#" >Home</a></li>
            <li><a href="#">Rent</a></li>
            <li><a href="#">Sell</a></li>
            <li><a href="#">Buy</a></li>
            <li><a href="#">About</a></li>
          </ul>

          <div class="nav-right">

           <button class="L-button" ><a href="#" class="btn-link label-medium">Login</a></button>

            <button class="s-button"><a href="#" class="btn btn-fill label-medium">Sign Up</a></button>
          </div>

          <!--Hero sction-->
        <section></section>
          
          <div></div>



        </nav>

        
      </div>
    </header>
   

<main>
    <article>

        <!--Hero section-->
        <main>
      <article>
        <!-- Hero -->

        <section class="hero">
          <div class="container">
            <div class="hero-content">

              <h1 class="hero-title">
                Find Your Dream Home with NtlwanaHomes
              </h1>

              <p class="hero-text">
                Discover the best properties for sale and rent in your area with
                NtlwanaHomes. Your trusted partner in real estate.</p>
            
              <form action="./" method="get" class="search-bar">
                <label for="" class="search-item">
                  <span class="label">Want to</span>
                  <select
                    name="want to"
                    id=""
                    class="search-item-field "
                  >
                    <option value="buy">Buy</option>
                    <option value="sell">Sell</option>
                    <option value="rent">Rent</option>
                  </select>

                  <span class="material-symbols-rounded" aria-hidden="true"
                    >real_estate_agent</span
                  >
                </label>

                <label for="" class="search-item">
                  <span class="label">Property type</span>
                  <select
                    name="property type"
                    id=""
                    class="search-item-field "
                  >
                    <option value="any">Any</option>
                    <option value="houses">Houses</option>
                    <option value="apartments">Apartments</option>
                    <option value="villa">Villa</option>
                    <option value="townhome">Townhome</option>
                    <option value="bungalow">Office Space</option>
                    <option value="loft">Loft</option>
                  </select>

                  <span class="material-symbols-rounded" aria-hidden="true"
                    >gite</span
                  >
                </label>

                <label for="" class="search-item">
                  <span class="label label-medium">Location</span>

                  <input
                    type="text"
                    name="location"
                    placeholder="Street, City"
                    class="search-item-field body-medium"
                  />
                  <span class="material-symbols-rounded" aria-hidden="true"
                    >location_on</span
                  >
                </label>

                <button type="submit" class="search-btn">
                  <span class="material-symbols-rounded" aria-hidden="true"
                    >search</span
                  >
                  <span class="label-medium">Search</span>
                </button>
              </form>
            </div>

            <img src="hero-background.png" alt="" class="hero-banner" width="816" height="644" role="presentation" >

            <img src="bg-pattern.png" alt="" class="hero-pattern" width="1240" height="840" role="presentation" >

            </div>
        </section>
      </article> 
    </main>


</body>

 







</html>
